name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/deepread_ci
      DIRECT_URL: postgresql://ci_user:ci_password@127.0.0.1:5432/deepread_ci
      BETTER_AUTH_SECRET: ci-only-placeholder-not-a-production-secret
      BETTER_AUTH_URL: http://127.0.0.1:3000
      CORS_ORIGIN: http://127.0.0.1:3001
      NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate repository
        run: bun run validate

      - name: Check diff hygiene
        run: git diff --check
